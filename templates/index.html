<!DOCTYPE html>
<html>
<head>
    <title>Object Detection App</title>
</head>
<body>

<h2>Upload Image for Object Detection</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Detect</button>
</form>

{% if output_image %}
    <h3>Result:</h3>
    <img src="{{ url_for('display_output', filename=output_image) }}" width="500">
{% endif %}

</body>
</html>
